services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: postgres
    command: postgres -c shared_preload_libraries=pg_cron,pg_stat_statements -c cron.database_name=dpc
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dpc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  valkey:
    image: valkey/valkey:8
    container_name: valkey
    ports:
      - "6379:6379"
    restart: always

  bull-board:
    image: venatum/bull-board:latest
    container_name: bull-board
    platform: linux/arm64
    ports:
      - "4567:3000"
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - BULL_PREFIX=bull
      - BULL_VERSION=BULLMQ
    depends_on:
      - valkey
    restart: always

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/database.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit_data:/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    restart: always

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      # MinIO가 준비될 때까지 잠시 대기
      # until /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin; do echo 'Waiting for MinIO...' && sleep 1; done;
      
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/dpc-bucket --ignore-existing;
      /usr/bin/mc anonymous set public myminio/dpc-bucket;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
  mailpit_data:
